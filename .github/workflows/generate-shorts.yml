name: Generate Shorts

# Runs 3x daily: 8AM, 2PM, 8PM EST (13:00, 19:00, 01:00 UTC)
on:
  schedule:
    - cron: "0 13 * * *"   # 8AM EST
    - cron: "0 19 * * *"   # 2PM EST
    - cron: "0 1  * * *"   # 8PM EST
  workflow_dispatch:        # allow manual trigger from Actions UI
    inputs:
      count:
        description: "Number of Shorts to generate"
        required: false
        default: "1"
      dry_run:
        description: "Dry run (skip real uploads)"
        type: boolean
        required: false
        default: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ───────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── 3. System dependencies ────────────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            libass9 \
            fonts-liberation

      # ── 4. Python dependencies ────────────────────────────────────────────────
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── 5. Restore OAuth tokens ───────────────────────────────────────────────
      # Token is base64-encoded and stored as a secret so it survives across runs.
      # IMPORTANT: Step 7 (Persist refreshed token) saves the post-refresh token
      # back to YOUTUBE_TOKEN_B64 after every successful run — this prevents the
      # secret from going stale when Google rotates credentials.
      - name: Restore OAuth tokens
        run: |
          mkdir -p config
          if [ -n "${{ secrets.YOUTUBE_TOKEN_B64 }}" ]; then
            echo "${{ secrets.YOUTUBE_TOKEN_B64 }}" | base64 -d > config/token.json
            echo "YouTube token restored"
          else
            echo "WARNING: YOUTUBE_TOKEN_B64 secret not set — uploads will fail"
          fi

      # ── 6. Download background music (SoundHelix, no API key required) ────────
      # assets/music/ is gitignored so runners start with no music files.
      # This step downloads CC0 dark/ambient tracks so every video has real music.
      # Falls back gracefully to sine-wave drone if this step fails.
      - name: Download background music
        continue-on-error: true
        env:
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        run: |
          python3 -m src.download_safe_music --source soundhelix
          echo "Music download complete"

      # ── 7. Run pipeline ───────────────────────────────────────────────────────
      - name: Run CipherPulse pipeline
        env:
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY:        ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
        run: |
          COUNT="${{ github.event.inputs.count || '1' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          ARGS="--mode news --count $COUNT"
          if [ "$DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python3 -m src.orchestrator $ARGS

      # ── 8. Persist refreshed OAuth token back to secret ───────────────────────
      # After each run the youtube_uploader auto-refreshes config/token.json.
      # This step saves the refreshed token back to YOUTUBE_TOKEN_B64 so the
      # next cron run starts with valid credentials.
      #
      # SETUP REQUIRED (one-time):
      #   1. Go to https://github.com/settings/tokens → Generate new token (classic)
      #   2. Grant scope: repo (includes secrets:write)
      #   3. Add it as a repo secret named GH_PAT
      #      (Settings → Secrets → Actions → New repository secret)
      # Without GH_PAT this step is skipped — uploads will eventually fail when
      # the token in YOUTUBE_TOKEN_B64 expires.
      - name: Persist refreshed OAuth token
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -f config/token.json ] && [ -n "$GH_TOKEN" ]; then
            gh secret set YOUTUBE_TOKEN_B64 \
              --body "$(base64 -w 0 config/token.json)" \
              --repo "${{ github.repository }}"
            echo "YOUTUBE_TOKEN_B64 secret updated with refreshed token"
          elif [ -z "$GH_TOKEN" ]; then
            echo "SKIPPED: GH_PAT secret not configured — see step comment for setup instructions"
          fi

      # ── 9. Upload video artifacts ─────────────────────────────────────────────
      - name: Upload generated Shorts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cipherpulse-shorts-${{ github.run_number }}
          path: |
            output/*/video.mp4
            output/*/thumbnail.png
            output/*/script.txt
            output/*/metadata.json
          retention-days: 7

      # ── 10. Upload run log ────────────────────────────────────────────────────
      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-log-${{ github.run_number }}
          path: output/run_log.json
          retention-days: 30
